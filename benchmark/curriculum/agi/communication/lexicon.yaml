    syllables: [syllable.CV, syllable.CV]
    stress: trochee
  semantic: {category: "first-word-typical-for-father"}
  composed_of: [infant.father, infant.warm, infant.comfort,
                infant.caregiver-bond, phoneme.d, phoneme.ah, binary.same]
