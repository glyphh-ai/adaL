# Lexicon — first words a child says, each grounded in BOTH a
# phoneme sequence (the sound) AND a semantic cluster (the meaning).
#
# Design point: closely-related words share many composition keys
# (so they cluster near each other in vector space); unrelated
# words share few/no keys (so they sit far apart).
#
# mama / milk / warm / hug → all near each other
# rock / gone / stranger / cold → far from the above
#
# This natural separation is what the substrate gets for free from
# honest compositional encoding.

# ══════════════════════════════════════════════════════════════════
# Warmth / kinship / caregiver cluster (close in vector space)
# ══════════════════════════════════════════════════════════════════

- key: lexicon.mama
  category: word
  entity: {name: mama, kind: word, subkind: kinship}
  perceptual:
    spelling: "mama"
    pronunciation: [phoneme.m, phoneme.ah, phoneme.m, phoneme.ah]
    syllables: [syllable.CV, syllable.CV]
    stress: trochee
  semantic: {category: "first-word-typical-for-mother"}
  composed_of: [infant.mother, infant.warm, infant.comfort,
                infant.smell-mother, infant.hear-mother-voice,
                infant.coo, infant.smile-reflex, infant.caregiver-bond,
                phoneme.m, phoneme.ah, binary.same]
  source: "developmental psychology + lexicon"

- key: lexicon.dada
  category: word
  entity: {name: dada, kind: word, subkind: kinship}
