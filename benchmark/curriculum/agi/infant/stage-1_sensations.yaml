# Stage 1 — innate sensations and reflexes (0-3 months).
#
# Bodily / sensory states the infant has access to before any learned
# categories. Each composes through the binary layer (stage 0), which
# itself terminates at NSM primes. The chain is:
#   sensation → binary distinctions → NSM primes
#
# This makes the layering explicit: every sensation is a combination
# of on/off cognitive contrasts.

# ── Interoceptive (internal body) ──────────────────────────────────

- key: infant.hunger
  category: sensation
  entity: {name: hunger, kind: sensation, subkind: interoceptive}
  semantic: {category: "want-food-internal-state, drives-crying"}
  composed_of: [binary.feel, binary.wanted, binary.bad, binary.inside]
  source: "developmental psychology"

- key: infant.thirst
  category: sensation
  entity: {name: thirst, kind: sensation, subkind: interoceptive}
  semantic: {category: "want-drink, dry-mouth"}
