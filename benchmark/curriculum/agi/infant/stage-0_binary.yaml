# Stage 0 — binary cognitive distinctions (pre-sensory).
#
# These are the on/off contrasts the brain encodes BEFORE specific
# sensations are categorized. Every higher-level concept (sensations,
# categories, emotions) decomposes through these binaries down to NSM
# primes.
#
# Pattern: for every prime that names a state, there is a binary
# distinction between "in that state" vs "not in that state." This
# layer makes those distinctions first-class.

# ── Negation / causation (logical primitives) ─────────────────────

- key: binary.not
  category: binary
  entity: {name: not, kind: binary, subkind: logical-negation}
  semantic: {category: "the-opposite, what-isn't"}
  composed_of: [prime.not]
  source: "developmental psychology"

- key: binary.because
  category: binary
  entity: {name: because, kind: binary, subkind: logical-causation}
  semantic: {category: "this-happened-because-of-that"}
  composed_of: [prime.because]
  source: "developmental psychology"

- key: binary.if
  category: binary
  entity: {name: if, kind: binary, subkind: logical-conditional}
  semantic: {category: "in-the-case-that-this-then-that"}
  composed_of: [prime.if]
  source: "developmental psychology"

- key: binary.maybe
  category: binary
  entity: {name: maybe, kind: binary, subkind: logical-uncertainty}
  semantic: {category: "this-might-or-might-not"}
  composed_of: [prime.maybe]
  source: "developmental psychology"

