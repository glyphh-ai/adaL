# English phonemes — atomic units of speech sound.
#
# A phoneme is something you HEAR and SAY. Each entry carries enough
# acoustic info (formant frequencies for vowels, articulation for
# consonants) that downstream code can synthesize a tone for it.
# This is the *audio anchor* layer — the bridge from labels in a
# YAML to actual perceivable sound.
#
# 44 phonemes covering General American English:
#   12 monophthong vowels
#    5 diphthong vowels
#   24 consonants
#    3 semi-vowels / approximants

# ══════════════════════════════════════════════════════════════════
# Vowels (monophthongs) — characterized by F1 and F2 formant freqs
# ══════════════════════════════════════════════════════════════════

- key: phoneme.i
  category: phoneme
  entity: {name: i, kind: phoneme, subkind: vowel-high-front}
  perceptual: {ipa: "i", spelling: "ee", audio: {f1: 270, f2: 2290, type: vowel}}
  semantic: {category: "high-front-tense-vowel, as-in-beat"}
  composed_of: [binary.hear, prime.say, prime.kind, prime.one, prime.like, prime.little, prime.inside]
  source: "english phonetics"

