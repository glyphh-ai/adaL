# Digit symbols 0-9.
#
# A digit is the VISUAL SYMBOL you write/see to represent a quantity.
# This is distinct from the quantity itself (which lives at
# layer-1/numbers.yaml as `number.*`). The digit references the
# quantity via composed_of.
#
# Each successive digit composes through the previous one + the
# successor relation (binary.after), so the lattice encodes the
# counting sequence as traversable structure.

- key: digit.0
  category: digit
  entity: {name: zero, kind: digit-symbol, subkind: numeric}
  perceptual: {symbol: "0", spoken: "zero"}
  semantic: {category: "visual-symbol-for-no-quantity, the-first-digit"}
  composed_of: [prime.something, binary.see, prime.say, prime.kind, prime.one, number.0]
  source: "elementary mathematics"

- key: digit.1
  category: digit
  entity: {name: one, kind: digit-symbol, subkind: numeric}
  perceptual: {symbol: "1", spoken: "one"}
  semantic: {category: "visual-symbol-for-quantity-1, after-zero"}
  composed_of: [digit.0, binary.after, number.1]
  source: "elementary mathematics"

