# Letters of the English alphabet, A-Z.
#
# Each letter is a visual symbol you see, a name you say, and a
# bridge to one or more phonemes (the sounds it can represent).
# Successive letters compose through the previous + binary.after,
# encoding alphabetical order as traversable structure.

- key: letter.a
  category: letter
  entity: {name: a, kind: letter, subkind: vowel}
  perceptual: {symbol: "A", spoken: "ay"}
  semantic: {category: "first-letter, vowel"}
  composed_of: [prime.something, binary.see, prime.say, prime.kind, prime.one, prime.words]
  source: "english orthography"

- key: letter.b
  category: letter
  entity: {name: b, kind: letter, subkind: consonant}
  perceptual: {symbol: "B", spoken: "bee"}
  semantic: {category: "second-letter, consonant"}
  composed_of: [letter.a, binary.after]
  source: "english orthography"

