  entity: {name: water-boiling-point, kind: property, subkind: phase-transition}
  quantitative: {magnitude: "100", unit: degrees-celsius}
  relational: {predicate: property-of, object: water}
  semantic: {category: "anomalously-high-for-mass, due-to-hydrogen-bonding"}
