name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: ruff check ada domains api infrastructure shared tests
      - run: pytest -q tests/
      - name: import sweep — every module loads
        run: |
          python - <<'PY'
          import importlib, os
          failed = []
          for d in ("ada", "domains", "api", "infrastructure", "shared"):
              for root, dirs, files in os.walk(d):
                  dirs[:] = [x for x in dirs if x != "__pycache__"]
                  for f in files:
                      if f.endswith(".py"):
                          m = os.path.join(root, f)[:-3].replace("/", ".")
                          m = m[:-9] if m.endswith(".__init__") else m
                          try:
                              importlib.import_module(m)
                          except Exception as e:
                              failed.append((m, str(e)))
          assert not failed, failed
          print("all modules import")
          PY
